<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>KMD</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">

  <!-- أيقونة اللوجو KMD -->
  <link rel="icon" type="image/png" href="https://iili.io/fXKDmiX.th.png">
  <link rel="apple-touch-icon" href="https://iili.io/fXKDmiX.th.png">

  <style>
    /* مكان أداة الترجمة */
    #google_translate_element {
      position: absolute;
      top: 10px;
      right: 10px;
      z-index: 9999;
    }

    /* تثبيت الفوتر */
    footer {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      text-align: center;
      background: #111;
      color: #fff;
      padding: 10px 0;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <!-- أداة الترجمة -->
  <div id="google_translate_element"></div>

  <!-- الساعة والتاريخ -->
  <div id="clock">
    🕒 <span id="time"></span> | 📅 <span id="date"></span>
  </div>

  <!-- شاشة الترحيب -->
  <header>
    <h1></h1>
    <p>بإذن الله أقدر أخدمك في المجالات اللي تحت دي</p>
  </header>

  <!-- عداد الزوار -->
  <div id="visitor-count">
    👥 عدد الزوار: <span id="visit-counter"></span>
  </div>

  <!-- الخدمات -->
  <section class="services show" id="services">
    <a href="telegram.html" class="service telegram"><img src="https://iili.io/f5iX49t.th.jpg" alt="تلجرام"><span>تلجرام</span></a>
    <a href="facebook.html" class="service facebook"><img src="https://iili.io/f5ijI7S.th.jpg" alt="فيسبوك"><span>فيسبوك</span></a>
    <a href="whatsapp.html" class="service whatsapp"><img src="https://iili.io/f5iwfyP.th.jpg" alt="واتساب"><span>واتساب</span></a>
    <a href="youtube.html" class="service youtube"><img src="https://iili.io/f5iN2xn.th.jpg" alt="يوتيوب"><span>يوتيوب</span></a>
    <a href="instagram.html" class="service instagram"><img src="https://iili.io/f5aoS71.md.jpg" alt="إنستجرام"><span>إنستجرام</span></a>
    <a href="tiktok.html" class="service tiktok"><img src="https://iili.io/f5aIAe1.md.jpg" alt="تيك توك"><span>تيك توك</span></a>
    <a href="other.html" class="service"><img src="https://iili.io/f5au6fj.md.jpg" alt="خدمات أخرى"><span>انشاء موقع ويب</span></a>
  </section>

  <!-- تواصل واتساب -->
  <section class="contact show" id="contact-section">
    <a href="https://wa.me/201155820103" target="_blank" class="whatsapp-contact">📱 تواصل واتساب</a>
  </section>

  <footer>
    <p>© جميع الحقوق محفوظة MAHMOUD ABODAHAB</p>
  </footer>

  <!-- مودال دخول المشرف -->
  <div id="admin-modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%;
       background:rgba(0,0,0,0.6); justify-content:center; align-items:center; z-index:10000;">
    <div style="background:#fff; padding:20px; border-radius:10px; width:300px; text-align:center;">
      <h2>🔑 دخول المشرف</h2>
      <input type="password" id="admin-password" placeholder="أدخل كلمة السر"
             style="width:90%; padding:10px; margin:10px 0; border:1px solid #ccc; border-radius:5px;">
      <button id="admin-submit" style="padding:10px 20px; background:#0088cc; color:#fff; border:none; border-radius:5px; cursor:pointer;">
        دخول
      </button>
      <p id="admin-error" style="color:red; display:none; margin-top:10px;">❌ كلمة السر غير صحيحة</p>
      <button onclick="document.getElementById('admin-modal').style.display='none'"
              style="margin-top:15px; background:#ccc; padding:8px 15px; border:none; border-radius:5px; cursor:pointer;">
        إغلاق
      </button>
    </div>
  </div>

  <!-- زر دخول المشرف -->
  <button class="admin-login-btn" style="position:fixed; bottom:60px; left:20px; padding:10px 15px;
          background:#333; color:#fff; border:none; border-radius:5px; cursor:pointer; z-index:9999;">
    👨‍💻 دخول المشرف
  </button>

  <!-- صوت عند الضغط -->
  <audio id="clickSound" src="sounds/click.mp3" preload="auto"></audio>

  <!-- مكتبات Firebase -->
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>

  <script src="script.js"></script>

  <!-- كود الترجمة -->
  <script type="text/javascript">
    function googleTranslateElementInit() {
      new google.translate.TranslateElement(
        {
          pageLanguage: 'ar',
          includedLanguages: 'en,fr,de',
          layout: google.translate.TranslateElement.InlineLayout.SIMPLE
        },
        'google_translate_element'
      );
    }
  </script>
  <script src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
</body>
</html>
